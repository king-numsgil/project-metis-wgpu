[package]
authors = ["Daniel Grondin <king@numsgil.co>"]
edition = "2021"
name = "bun_webgpu_rs"
version = "0.1.0"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "3.0.0", features = ["async"] }
napi-derive = "3.0.0"
mimalloc = { version = "0.1", default-features = false }
wgpu = { version = "24", features = ["wgsl"] }
raw-window-handle = "0.6"
tokio = { version = "1", features = ["sync"] }
sdl3-sys = { version = "0.6.7", features = ["build-from-source-static"] }
sdl3-image-sys = { version = "0.6.4", features = ["build-from-source-static"] }
num_enum = "0.7.6"
lyon_tessellation = "1"
lyon_path = "1"
lyon_geom = "1"
ttf-parser = "0.21"
png = "0.18.1"

[build-dependencies]
napi-build = "2"

[profile.release]
strip = "symbols"
opt-level = 3
lto = "fat"
codegen-units = 1
